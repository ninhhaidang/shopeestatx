<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopeeStatX</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <div class="popup-header">
      <h1 class="popup-title" data-i18n="app.title">ShopeeStatX</h1>
      <div class="version-badge">v3.1</div>
    </div>

    <div class="popup-body">
      <div id="userGreeting" class="user-greeting hidden">
        <img id="userAvatar" class="user-avatar-large" src="" alt="Avatar">
        <div class="user-greeting-text">
          <span class="user-greeting-hello" data-i18n="popup.hello">Xin chào</span>
          <span id="userName" class="user-greeting-name"></span>
        </div>
      </div>

      <div id="featureCard" class="feature-card">
        <h2 class="feature-title" data-i18n="popup.featureTitle">Phân tích chi tiêu thông minh</h2>
        <p class="feature-description" data-i18n="popup.featureDesc">Xem chi tiết lịch sử mua hàng, xu hướng chi tiêu và thống kê từng shop</p>
      </div>

      <button id="btnStart" class="btn-primary" data-i18n="popup.btnStart">
        Bắt đầu phân tích
      </button>

      <p id="warning" class="warning-message hidden" data-i18n="popup.warning">
        Vui lòng mở <a id="shopee-purchase-link" href="#" target="_blank">Shopee</a> và đăng nhập trước.
      </p>
      <p id="redirecting" class="redirecting-message hidden">
        Vui lòng <a id="shopee-login-link" href="#">truy cập Shopee và đăng nhập</a> để sử dụng.
      </p>
    </div>

    <div class="popup-footer">
      <div class="footer-links">
        <a href="https://www.buymeacoffee.com/ninhhaidang" target="_blank" class="footer-link" title="Support">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 21.5 5.42 21.5 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </a>
        <span class="footer-divider">·</span>
        <a href="https://github.com/ninhhaidang/shopee-orders-statics" target="_blank" class="footer-link" title="Star on GitHub">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" />
          </svg>
          <span>Star</span>
        </a>
        <span class="footer-divider">·</span>
        <a href="https://chromewebstore.google.com/detail/shopeestatx/hhcfonmapcabjmaghpapehegbmhdceim" target="_blank" class="footer-link" title="Rate on Chrome Store">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" />
          </svg>
          <span>Rate</span>
        </a>
        <span class="footer-divider">·</span>
        <a id="btnHelp" href="#" class="footer-link" data-i18n="popup.help">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 15c-2.67 0-8 1.34-8 8h4c0-2.67 5.33-4 8-4zm0-4.7c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z" />
          </svg>
          <span>Hướng dẫn</span>
        </a>
        <span class="footer-divider">·</span>
        <a id="btnPrivacy" href="#" class="footer-link" data-i18n="popup.privacy">Bảo mật</a>
      </div>
    </div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>

</html>
